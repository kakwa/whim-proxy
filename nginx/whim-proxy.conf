upstream whim_proxy {
    server 127.0.0.1:9000;
    keepalive 32;
}

server {
    listen 80;
    server_name _;

    # Home page
    location = / {
        proxy_pass         http://whim_proxy;
        proxy_http_version 1.1;
        proxy_set_header   Host            $host;
        proxy_set_header   X-Real-IP       $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Favicon (SVG + ICO redirect)
    location ~ ^/favicon\. {
        proxy_pass         http://whim_proxy;
        proxy_http_version 1.1;
        proxy_set_header   Host            $host;
        add_header         Cache-Control   "max-age=86400";
    }

    # Client binary downloads — disable buffering so large files stream directly
    location /clients/ {
        proxy_pass         http://whim_proxy;
        proxy_http_version 1.1;
        proxy_set_header   Host            $host;
        proxy_set_header   X-Real-IP       $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_buffering    off;
        proxy_read_timeout 120s;
    }

    # WebSocket subscribers — requires Upgrade/Connection passthrough
    # Note: --max-clients-per-ip on the server sees 127.0.0.1 when behind nginx.
    # Use nginx limit_conn for real per-IP rate limiting if needed.
    location /subscribe/ {
        proxy_pass         http://whim_proxy;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade         $http_upgrade;
        proxy_set_header   Connection      "upgrade";
        proxy_set_header   Host            $host;
        proxy_set_header   X-Real-IP       $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;

        # Keep WebSocket connections open
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
    }

    # Webhook ingestion
    location /hook/ {
        proxy_pass         http://whim_proxy;
        proxy_http_version 1.1;
        proxy_set_header   Host            $host;
        proxy_set_header   X-Real-IP       $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;

        # Accept arbitrarily large payloads from external senders
        client_max_body_size 10m;
    }

    # Event log (last 10 events per channel)
    location /logs/ {
        proxy_pass         http://whim_proxy;
        proxy_http_version 1.1;
        proxy_set_header   Host            $host;
        proxy_set_header   X-Real-IP       $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
